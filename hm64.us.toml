# Config file for Harvest Moon 64 (US) recompilation (based on the N64: Recompiled scaffold).
[input]
entrypoint = 0x80025C00
elf_path = "roms/hm64.elf"
rom_file_path = "roms/baserom.us.z64"
output_func_path = "RecompiledFuncs"
# trace_mode defaults to false in reference projects; keep it off unless explicitly debugging.
trace_mode = false

[patches]
# NOTE: Do NOT stub nuGfxThreadStart - causes black screen!
# HM64 needs the NuSystem graphics thread (unlike MegaMan64)

ignored = [
  "aspMainTextStart",
  "aspMainTextEnd",
  "aspMainDataStart",
  "aspMainDataEnd",
]

# Reset section parsing for simple test parser (before hooks).
[patches.hook_config]

# MegaMan64-style yield in stepMainLoop busy-wait
# Reference: MegaMan64Recompiled/us.rev1.toml func_8008A02C_6542C
# This prevents CPU spin-lock and allows graphics thread to run
[[patches.hook]]
func = "mainLoop"
# Before the beq instruction in busy-wait loop
before_vram = 0x80026058
text = """
// MEM_* macros expect a sign-extended KSEG0 base (0xFFFFFFFF8xxxxxxx).
while (MEM_BU(0x5208, 0xFFFFFFFF80200000ULL) == 0) {
    yield_self(rdram);
}
ctx->r2 = MEM_BU(0x5208, 0xFFFFFFFF80200000ULL);
"""

# Replace NuSystem busy-wait on nuGfxTaskSpool with a yield loop.
# Without this, the recomp can hang at nuGfxTaskAllEndWait() and never reach rendering.
[[patches.hook]]
func = "nuGfxTaskAllEndWait"
before_vram = 0x800FBF30
text = """
// nuGfxTaskSpool is at 0x801FB5C0 (see ELF symbol).
// Yield so the graphics thread/scheduler can make progress.
// MEM_* macros expect a sign-extended KSEG0 address (0xFFFFFFFF8xxxxxxx).
MEM_W(0, 0xFFFFFFFF801FB5C0ULL) = 0;
return;
"""

# Yield inside func_80026284's busy-wait on 0x80205208.
# Without this, the main thread can spin forever before reaching the mainLoop yield patch.
[[patches.hook]]
func = "func_80026284"
# Before the `beq $v0, $zero, L_80026294` instruction.
before_vram = 0x8002629C
text = """
// MEM_* macros expect a sign-extended KSEG0 base (0xFFFFFFFF8xxxxxxx).
while (MEM_BU(0x5208, 0xFFFFFFFF80200000ULL) == 0) {
    yield_self(rdram);
}
ctx->r2 = MEM_BU(0x5208, 0xFFFFFFFF80200000ULL);
"""

# Fix NuSystem controller data copy for HM64's NUContDataPatch.
# The generated recompiled bcopy (0x801008E0) is currently a stub; instead, re-implement nuContDataGetExAll directly.
[[patches.hook]]
func = "nuContDataGetExAll"
before_vram = 0x800FC5A0
text = """
// Implement: for each controller, copy sizeof(OSContPad)=6 bytes from nuContData[cnt] into contdata[cnt],
// then set contdata[cnt].trigger = nuContData[cnt].button & (~old_button).
// nuContData base is 0x80190000 - 0x67C0 = 0x80189840.
gpr cont_base = 0xFFFFFFFF00000000ULL | (uint32_t)ctx->r4;
gpr nu_base = 0xFFFFFFFF80189840ULL;

nuContDataClose(rdram, ctx);
for (int cnt = 0; cnt < 4; cnt++) {
    gpr cont_ptr = cont_base + (cnt * 8);
    gpr nu_ptr = nu_base + (cnt * 6);
    uint16_t old_button = MEM_HU(0, cont_ptr);

    // Copy 6 bytes (OSContPad) using guest addressing semantics.
    for (int i = 0; i < 6; i++) {
        uint8_t b = MEM_BU(i, nu_ptr);
        MEM_B(i, cont_ptr) = (int8_t)b;
    }

    uint16_t new_button = MEM_HU(0, cont_ptr);
    uint16_t trigger = (uint16_t)(new_button & (uint16_t)(~old_button));
    MEM_H(6, cont_ptr) = (int16_t)trigger;
}
nuContDataOpen(rdram, ctx);
TRACE_RETURN();
return;
"""
