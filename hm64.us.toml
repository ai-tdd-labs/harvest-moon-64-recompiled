# Config file for Harvest Moon 64 (US) recompilation (based on the N64: Recompiled scaffold).
[input]
entrypoint = 0x80025C00
elf_path = "roms/hm64.elf"
rom_file_path = "roms/baserom.us.z64"
output_func_path = "RecompiledFuncs"
trace_mode = true

[patches]
# NOTE: Do NOT stub nuGfxThreadStart - causes black screen!
# HM64 needs the NuSystem graphics thread (unlike MegaMan64)

ignored = [
  "aspMainTextStart",
  "aspMainTextEnd",
  "aspMainDataStart",
  "aspMainDataEnd",
]

# Reset section parsing for simple test parser (before hooks).
[patches.hook_config]

# MegaMan64-style yield in stepMainLoop busy-wait
# Reference: MegaMan64Recompiled/us.rev1.toml func_8008A02C_6542C
# This prevents CPU spin-lock and allows graphics thread to run
[[patches.hook]]
func = "mainLoop"
# Before the beq instruction in busy-wait loop
before_vram = 0x80026058
text = """
// MEM_* macros expect a sign-extended KSEG0 base (0xFFFFFFFF8xxxxxxx).
while (MEM_BU(0x5208, 0xFFFFFFFF80200000ULL) == 0) {
    yield_self(rdram);
}
ctx->r2 = MEM_BU(0x5208, 0xFFFFFFFF80200000ULL);
"""

# Yield inside func_80026284's busy-wait on 0x80205208.
# Without this, HM64 can spin long enough that VI never gets unblack (black screen).
[[patches.hook]]
func = "func_80026284"
# Before the `beq $v0, $zero, L_80026294` instruction.
before_vram = 0x8002629C
text = """
// MEM_* macros expect a sign-extended KSEG0 base (0xFFFFFFFF8xxxxxxx).
while (MEM_BU(0x5208, 0xFFFFFFFF80200000ULL) == 0) {
    yield_self(rdram);
}
ctx->r2 = MEM_BU(0x5208, 0xFFFFFFFF80200000ULL);
"""

# Prevent NuSystem init from starving other threads by yielding in nuGfxTaskAllEndWait.
# This is a minimal semantic-preserving change: wait until nuGfxTaskSpool becomes 0, but yield while waiting.
[[patches.hook]]
func = "nuGfxTaskAllEndWait"
before_vram = 0x800FBF30
text = """
// nuGfxTaskSpool is at 0x801FB5C0 (see ELF symbol).
// MEM_* macros expect a sign-extended KSEG0 address (0xFFFFFFFF8xxxxxxx).
while (MEM_W(0, 0xFFFFFFFF801FB5C0ULL) != 0) {
    yield_self(rdram);
}
TRACE_RETURN();
return;
"""

## NOTE: nuGfxTaskAllEndWait yield-wait hook required to avoid black screen during init.
